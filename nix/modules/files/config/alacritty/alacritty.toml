[window]
decorations = "None"
opacity = 0.8
padding = { x = 10, y = 10 }
# dynamic_padding = true
option_as_alt = "Both"

[scrolling]
history = 100000
multiplier = 5

[font]
normal = { family = "MesloLGS Nerd Font", style = "Regular" }
size = 14
builtin_box_drawing = false

# ToggleFullscreen
[keyboard]
bindings = [
    # { key = "N", mods = "Control|Shift", action = "CreateNewWindow" },
    # { key = "L", mods = "Control|Shift", chars = "l" },
    # { key = "F", mods = "Control", action = "ToggleFullscreen" },
    # { key = "F", mods = "Command|Shift", action = "ToggleFullscreen" },
    # handled by `skhd` since alacritty doesn't support Fn/Globe key
    # ^^ no?
    # { key = "F", mods = "Fn", action = "ToggleFullscreen" },

    # alt left/right to move between words
    # alt delete to delete word is handled by window.option_as_alt
    { key = "Right", mods = "Alt", chars = "\u001BF" },
    { key = "Left", mods = "Alt", chars = "\u001BB" },

    # command left/right to move to beginning/end of line
    { key = "Right", mods = "Command", chars = "\u0005" },
    { key = "Left", mods = "Command", chars = "\u0001" },

    # command delete to delete line
    { key = "Back", mods = "Command", chars = "\u0015" },

    # command t to open new window
    { key = "t", mods = "Command", action = "CreateNewWindow" },
    # control n to open new window
    # { key = "n", mods = "Control", action = "CreateNewWindow" },
]

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Underline", blinking = "On" }
unfocused_hollow = true

[terminal]
osc52 = "CopyPaste"

[mouse]
# hide_when_typing = true
bindings = [
    { mouse = "Right", action = "Paste" }
]

# force env variables for en us and utf8
[env]
LANG = "en_US.UTF-8"
# force the next ones for raycast extension
EDITOR = "/opt/homebrew/bin/nvim" 
PATH = "/Users/steven/.local/bin:/Users/steven/Library/Python/3.13/bin:/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:/Library/Apple/usr/bin"
HOMEBREW_PREFIX = "/opt/homebrew"
HOMEBREW_CELLAR = "/opt/homebrew/Cellar"
HOMEBREW_REPOSITORY = "/opt/homebrew"

[general]
# previously alabaster_dark
import = ["themes/themes/one_dark.toml"]
# curl -sSL https://raw.githubusercontent.com/alacritty/alacritty/master/extra/alacritty.info | tic -x -


# import = ["astrodark.toml"]
# LC_CTYPE = "en_US.UTF-8"
# LC_ALL = "en_US.UTF-8"


[[hints.enabled]]
# command = "xdg-open" # On Linux/BSD
# command = "open" # On macOS
# command = { program = "cmd", args = [ "/c", "start", "" ] } # On Windows
hyperlinks = true
post_processing = true
persist = false
action = "select"
mouse.enabled = true
# binding = { key = "O", mods = "Control|Shift" }
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`\\\\]+"
